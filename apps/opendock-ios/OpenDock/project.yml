name: OpenDock
options:
  bundleIdPrefix: com.athion
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
targets:
  OpenDock:
    type: application
    platform: iOS
    sources:
      - OpenDock
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.athion.opendock
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
      INFOPLIST_KEY_CFBundleDisplayName: "OpenDock"
      INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
    info:
      path: OpenDock/Info.plist
      properties:
        UIAppFonts:
          - OpenAISans-Regular.ttf
          - OpenAISans-Medium.ttf
          - OpenAISans-Semibold.ttf
