<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>opendock</title>
    <script>
      (function () {
        if (window.__OPENDOCK_BOARDS_URL) return;
        const protocol = window.location.protocol;
        const hostname = window.location.hostname;
        const portString = window.location.port;
        const currentPort = Number.parseInt(portString, 10);
        const devPorts = [5173, 5174, 5175, 5176];

        const resolvePort = () => {
          if (Number.isFinite(currentPort)) {
            const next = devPorts.find((value) => value !== currentPort);
            if (typeof next === "number") {
              return next;
            }
            if (currentPort > 0 && currentPort < 65535) {
              return currentPort + 1;
            }
          }
          if (hostname === "localhost" || hostname === "127.0.0.1") {
            return 5173;
          }
          return null;
        };

        const targetPort = resolvePort();
        if (typeof targetPort === "number") {
          window.__OPENDOCK_BOARDS_URL = `${protocol}//${hostname}:${targetPort}/dashboard`;
        }
      })();
    </script>
    <script>
      // Apply theme immediately to prevent flash
      (function() {
        const stored = localStorage.getItem('opendock-theme');
        const theme = stored === 'dark' || stored === 'light' 
          ? stored 
          : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.classList.add(theme);
        // Set background color immediately before CSS loads
        if (theme === 'dark') {
          document.documentElement.style.backgroundColor = '#000000';
        }
      })();
    </script>
  </head>
  <body style="margin: 0; padding: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
