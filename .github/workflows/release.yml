name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
            artifact_name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_name: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            artifact_name: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/opendock/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build Opendock
        working-directory: apps/opendock
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        shell: bash
        working-directory: apps/opendock/src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          find . -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz" \) -exec cp {} "$GITHUB_WORKSPACE/dist/" \;
          ls -la "$GITHUB_WORKSPACE/dist/"

      - uses: actions/upload-artifact@v4
        with:
          name: opendock-${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
